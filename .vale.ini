StylesPath = /Users/steve/Library/Application Support/vale/styles
MinAlertLevel = suggestion
Vocab = ElasticTerms, TechJargon, ThirdPartyProducts

[*.md]
BasedOnStyles = Readability,alex,proselint,write-good,Elastic

[*.go]
BasedOnStyles = alex,proselint,write-good,Elastic
# In Go-doc context, "simple expression"/"simple number" come from the
# template/Go grammar's own terminology (text/template/parse), not from
# prose targeted at humans — alex.Condescending false-positives here.
alex.Condescending = NO
# {{ ... }} is the literal Go-template action syntax; the rule wants
# the typographic ellipsis "…" which would change the meaning.
proselint.Typography = NO
