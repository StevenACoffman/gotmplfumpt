project: "gotmplfmt"

go_settings:
  go_proxy: "https://proxy.golang.org"
  go_exe: "go"

build_settings:
  binary: "gotmplfmt"
  flags:
    - "-buildmode"
    - "exe"
  env:
    - "CGO_ENABLED=0"
  ldflags: "-s -w -X main.tag=${HUGORELEASER_TAG}"

archive_settings:
  name_template: "{{ .Project }}_{{ .Tag | trimPrefix `v` }}_{{ .Goos }}-{{ .Goarch }}"
  extra_files:
    - source_path: "README.md"
      target_path: "README.md"
    - source_path: "LICENSE"
      target_path: "LICENSE"
  type:
    format: "tar.gz"
    extension: ".tar.gz"

release_settings:
  name: "${HUGORELEASER_TAG}"
  type: "github"
  repository: "gotmplfmt"
  repository_owner: "gohugoio"

  draft: true
  prerelease: false

  release_notes_settings:
    generate: true
    generate_on_host: false
    filename: ""
    template_filename: ""
    short_threshold: 10
    short_title: "What's Changed"

    groups:
      - regexp: "snapcraft:|Merge commit|Squashed"
        ignore: true
      - title: "Bug fixes"
        regexp: "fix"
        ordinal: 20
      - title: "Dependency Updates"
        regexp: "deps"
        ordinal: 30
      - title: "Documentation"
        regexp: "doc"
        ordinal: 40
      - title: "Improvements"
        regexp: ".*"
        ordinal: 10

builds:
  - path: "unix"
    os:
      - goos: "linux"
        archs:
          - goarch: "amd64"

  - path: "macos"
    os:
      - goos: "darwin"
        archs:
          - goarch: "universal"

  - path: "windows"
    os:
      - goos: "windows"
        build_settings:
          binary: "gotmplfmt.exe"
        archs:
          - goarch: "amd64"

archives:
  - paths:
      - "builds/{unix,macos}/**"

  - paths:
      - "builds/macos/**"
    archive_settings:
      extra_files: []
      type:
        format: "_plugin"
        extension: ".pkg"
      plugin:
        id: "macospkgremote"
        type: "gorun"
        command: "github.com/gohugoio/hugoreleaser-archive-plugins/macospkgremote@5cf673e24cb39d8bbe63930fe6c499211b43c633"
      custom_settings:
        package_identifier: "io.gohugo.gotmplfmt"
        package_version: "${HUGORELEASER_TAG}"
        bucket: "s3fptest"
        queue: "https://sqs.eu-north-1.amazonaws.com/656975317043/s3fptest_client"
        access_key_id: "${S3RPC_CLIENT_ACCESS_KEY_ID}"
        secret_access_key: "${S3RPC_CLIENT_SECRET_ACCESS_KEY}"
  - paths:
      - "builds/**/linux/amd64"
    archive_settings:
      binary_dir: "/usr/local/bin"
      extra_files: []
      type:
        format: "_plugin"
        extension: ".deb"
      plugin:
        id: "deb"
        type: "gorun"
        command: "github.com/gohugoio/hugoreleaser-archive-plugins/deb@latest"
      custom_settings:
        vendor: "gohugo.io"
        homepage: "https://github.com/gohugoio/gotmplfmt"
        maintainer: "Bjørn Erik Pedersen <bjorn.erik.pedersen@gmail.com>"
        description: "Format Go templates."
        license: "Apache-2.0"

  - paths:
      - "builds/windows/**"
    archive_settings:
      type:
        format: "zip"
        extension: ".zip"
releases:
  - paths:
      - "archives/**"
    path: "myrelease"

publishers:
  - paths:
      - releases/**
    type:
      format: github_release
  - paths:
      - releases/**/archives/macos/**
    type:
      format: homebrew_cask
    custom_settings:
      bundle_identifier: io.gohugo.gotmplfmt
      homepage: "https://github.com/gohugo/gotmplfmt"
      description: "A Go template formatter."
