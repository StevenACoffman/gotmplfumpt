on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
# When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  GOPRIVATE: "github.com/StevenACoffman"
  GOFLAGS: "-trimpath"
  GOLANGCI_LINT_VERSION: latest
permissions:
  contents: read
name: Test
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: 'stable'
          check-latest: true
          cache-dependency-path: "**/*.sum"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout 5m
          verify: false
      - name: Check go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest
        shell: bash
      - name: Self-format idempotence check
        if: matrix.platform == 'ubuntu-latest'
        # Running the formatter against its own golden out/ directory
        # must be a no-op: gofumpt-formatted templates are a fixed point.
        run: |
          go install .
          diff <(gotmplfumpt -d internal/format/testdata/golden/out) <(printf '')
        shell: bash
